name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
      - fix/**
      - refactor/**
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        run: dotnet restore empilhadeiras-checklist.sln

      - name: Build backend
        run: dotnet build backend/Checklist.Api/Checklist.Api.csproj --no-restore --configuration Release

      - name: Run backend tests
        run: dotnet test backend/Checklist.Api.Tests/Checklist.Api.Tests.csproj --no-restore --configuration Release

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/checklist-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/checklist-web

      - name: Build frontend
        run: npm run build
        working-directory: frontend/checklist-web
